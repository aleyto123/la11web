spring:
  application:
    name: eureka-server
  profiles:
    active: dev

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false

---
spring:
  config:
    activate:
      on-profile: dev
eureka:
  instance:
    hostname: localhost

---
spring:
  config:
    activate:
      on-profile: test
server:
  port: 8762

---
spring:
  config:
    activate:
      on-profile: prod
server:
  port: 8761
eureka:
  server:
    enable-self-preservation: true
